<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Graph Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #111; padding: 2rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    p.sub { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    textarea {
      width: 100%; height: 140px; padding: 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; font-family: monospace;
      resize: vertical; background: #fff;
    }
    button {
      margin-top: 12px; padding: 10px 24px; background: #2563eb;
      color: #fff; border: none; border-radius: 8px; font-size: 15px;
      cursor: pointer; font-weight: 500;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    #error { color: #dc2626; margin-top: 12px; font-size: 14px; display: none; }
    #results { margin-top: 2rem; display: none; }
    .card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 1.25rem; margin-bottom: 1rem;
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; color: #374151; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 99px;
      font-size: 12px; font-weight: 500; margin-right: 6px;
    }
    .badge-tree { background: #dcfce7; color: #166534; }
    .badge-cycle { background: #fee2e2; color: #991b1b; }
    .tree-pre {
      background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px;
      padding: 10px 14px; font-family: monospace; font-size: 13px;
      white-space: pre; overflow-x: auto; margin-top: 8px;
    }
    .tag {
      display: inline-block; background: #f3f4f6; border: 1px solid #d1d5db;
      border-radius: 6px; padding: 3px 10px; font-size: 13px;
      font-family: monospace; margin: 3px;
    }
    .tag-invalid { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
    .tag-dup { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .stat { background: #f9fafb; border-radius: 8px; padding: 14px; text-align: center; }
    .stat .val { font-size: 1.8rem; font-weight: 600; color: #2563eb; }
    .stat .lbl { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .loading { color: #6b7280; font-size: 14px; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Graph Hierarchy Analyzer</h1>
  <p class="sub">Enter edges like A->B, one per line or comma separated</p>

  <textarea id="input" placeholder="A->B&#10;A->C&#10;B->D&#10;X->Y&#10;Y->X&#10;hello&#10;1->2"></textarea>
  <br/>
  <button id="btn" onclick="analyze()">Analyze Graph</button>
  <div id="error"></div>
  <p id="loading" class="loading" style="display:none">Analyzing...</p>

  <div id="results">
    <div class="card" id="summary-card">
      <h2>Summary</h2>
      <div class="summary-grid" id="summary-grid"></div>
    </div>
    <div class="card" id="hierarchies-card">
      <h2>Hierarchies</h2>
      <div id="hierarchies-list"></div>
    </div>
    <div class="card" id="invalid-card">
      <h2>Invalid entries</h2>
      <div id="invalid-list"></div>
    </div>
    <div class="card" id="duplicates-card">
      <h2>Duplicate edges</h2>
      <div id="duplicates-list"></div>
    </div>
  </div>

  <script>
    function renderTree(obj, indent = 0) {
      let out = ''
      for (const [key, val] of Object.entries(obj)) {
        out += '  '.repeat(indent) + '└─ ' + key + '\n'
        out += renderTree(val, indent + 1)
      }
      return out
    }

    async function analyze() {
      const raw = document.getElementById('input').value.trim()
      if (!raw) return

      const edges = raw.split(/[\n,]/).map(s => s.trim()).filter(Boolean)

      document.getElementById('error').style.display = 'none'
      document.getElementById('results').style.display = 'none'
      document.getElementById('loading').style.display = 'block'
      document.getElementById('btn').disabled = true

      try {
        const res = await fetch('/api/graph', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ edges })
        })
        if (!res.ok) throw new Error('API returned ' + res.status)
        const data = await res.json()
        renderResults(data)
      } catch (e) {
        document.getElementById('error').textContent = 'Error: ' + e.message
        document.getElementById('error').style.display = 'block'
      } finally {
        document.getElementById('loading').style.display = 'none'
        document.getElementById('btn').disabled = false
      }
    }

    function renderResults(data) {
      // summary
      const s = data.summary
      document.getElementById('summary-grid').innerHTML = `
        <div class="stat"><div class="val">${s.total_trees}</div><div class="lbl">Valid trees</div></div>
        <div class="stat"><div class="val">${s.total_cycles}</div><div class="lbl">Cycles detected</div></div>
        <div class="stat"><div class="val">${s.largest_tree_root || '—'}</div><div class="lbl">Largest tree root</div></div>
      `

      // hierarchies
      const hList = document.getElementById('hierarchies-list')
      hList.innerHTML = ''
      for (const h of data.hierarchies) {
        const div = document.createElement('div')
        div.style.marginBottom = '14px'
        const badge = h.has_cycle
          ? '<span class="badge badge-cycle">cycle</span>'
          : '<span class="badge badge-tree">tree</span>'
        const depthInfo = h.depth ? ` &nbsp;depth: <strong>${h.depth}</strong>` : ''
        const treeText = h.has_cycle
          ? '(cyclic — no tree structure)'
          : renderTree(h.tree) || '(empty)'
        div.innerHTML = `
          <div style="margin-bottom:6px">${badge} <strong>Root: ${h.root}</strong>${depthInfo}</div>
          <div class="tree-pre">${treeText}</div>
        `
        hList.appendChild(div)
      }

      // invalid
      const invEl = document.getElementById('invalid-list')
      invEl.innerHTML = data.invalid_entries.length
        ? data.invalid_entries.map(e => `<span class="tag tag-invalid">${e || '(empty)'}</span>`).join('')
        : '<span style="color:#6b7280;font-size:14px">None</span>'

      // duplicates
      const dupEl = document.getElementById('duplicates-list')
      dupEl.innerHTML = data.duplicate_edges.length
        ? data.duplicate_edges.map(e => `<span class="tag tag-dup">${e}</span>`).join('')
        : '<span style="color:#6b7280;font-size:14px">None</span>'

      document.getElementById('results').style.display = 'block'
    }
  </script>
</body>
</html>
